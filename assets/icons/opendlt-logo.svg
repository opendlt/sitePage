<svg width="140" height="32" viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Open Delta: triangle with open apex = "open" + Δ for "DLT" -->
  <!-- Subtle interior fill for depth -->
  <path d="M 13 5 L 5 27 L 27 27 L 19 5" fill="url(#logoGradient)" opacity="0.06"/>
  <!-- Stroke outline (open at the top) -->
  <path d="M 13 5 L 5 27 L 27 27 L 19 5" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Network nodes at vertices -->
  <circle cx="5" cy="27" r="2.5" fill="url(#logoGradient)"/>
  <circle cx="27" cy="27" r="2.5" fill="url(#logoGradient)"/>
  <circle cx="13" cy="5" r="2.5" fill="url(#logoGradient)"/>
  <circle cx="19" cy="5" r="2.5" fill="url(#logoGradient)"/>

  <!-- Wordmark: single line -->
  <text x="35" y="21" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">
    <tspan fill="#0f172a">Open</tspan><tspan fill="#0d9488">DLT</tspan>
  </text>
</svg>
