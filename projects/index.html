<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDLT Projects</title>
    <meta name="description" content="Explore OpenDLT's decentralized technology projects">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../favicon.ico">

    <!-- Simple inline styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            color: #e2e8f0;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            text-align: center;
            max-width: 600px;
        }

        .logo {
            width: 64px;
            height: auto;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 48px;
        }

        .project-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: #0ea5e9;
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .project-description {
            color: #64748b;
            margin-bottom: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
        }

        .back-link {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #0ea5e9;
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← Back to OpenDLT</a>

    <div class="container">
        <div class="content">
            <img src="../assets/icons/opendlt-logo.svg" alt="OpenDLT" class="logo">
            <h1>Projects</h1>
            <p class="subtitle">Explore our decentralized technology initiatives</p>

            <div class="project-card">
                <h3 class="project-title">Lattica Universal DIDs</h3>
                <p class="project-description">
                    World's first universal cross-chain identity system. One DID, every blockchain.
                    Privacy-preserving credentials with selective disclosure.
                </p>
                <a href="lattica/" class="btn-primary">Explore Lattica →</a>
            </div>
        </div>
    </div>
</body>
</html>
